name: CI

on:
  push:
  schedule:
    - cron: '0 8 * * *'

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm nuxt typecheck
      - run: pnpm eslint . --ext .ts,.vue

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'


      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run

  build:
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: nuxt-build
          path: .output
